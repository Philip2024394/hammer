name: Deploy to Vercel (production)

# Manual + automatic backup deploy path. Use this when the GitHub →
# Vercel auto-integration is broken or temporarily detached. The
# workflow can be triggered three ways:
#
# 1. Manual button: GitHub → Actions → "Deploy to Vercel (production)"
#    → Run workflow → main → Run.
# 2. Auto on every push to main (acts as a redundancy on top of the
#    Vercel GitHub app — if the app is healthy, Vercel skips the
#    duplicate deploy automatically; if it's broken, this one wins).
# 3. Tag push (v* tags) — useful when you cut release tags.
#
# Required GitHub repository secret (Settings → Secrets and variables
# → Actions → New repository secret):
#
#   VERCEL_TOKEN  — create at https://vercel.com/account/tokens
#                  (scope: Full Account, no expiry / 1 year)
#
# Org + project IDs are NOT secret (they live in the gitignored
# .vercel/project.json on every developer's machine), so they're
# inlined below. Update them if you ever re-link to a different
# Vercel project.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: vercel-prod
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_V2wq2UWN3RWynCwHUV0BZZDj
  VERCEL_PROJECT_ID: prj_4vjiQPPEYIoBS9QjJqTWx9uMn1v6

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project (production)
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel-prebuilt)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artefacts to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed: $DEPLOY_URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Annotate run with deploy URL
        run: |
          echo "### ✅ Production deploy complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**URL**: ${{ steps.deploy.outputs.deploy_url }}" >> "$GITHUB_STEP_SUMMARY"
